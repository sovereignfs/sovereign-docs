name: CI

# This plugin depends on workspace-only platform packages (@sovereignfs/sdk,
# @sovereignfs/ui, @sovereignfs/tsconfig) and can't be linted/typechecked in
# isolation. CI composes this checkout into a fresh clone of the platform
# monorepo (sovereignfs/sovereign) at the path the platform expects
# (plugins/sovereign-docs.local — see README "Local development"), then runs
# format/lint/typecheck/test scoped to this plugin's files.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Checkout platform
        uses: actions/checkout@v4
        with:
          repository: sovereignfs/sovereign
          path: platform

      - name: Compose plugin into platform workspace
        run: |
          rm -rf platform/plugins/sovereign-docs.local
          cp -r plugin platform/plugins/sovereign-docs.local

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: pnpm
          cache-dependency-path: platform/pnpm-lock.yaml

      - name: Install workspace deps
        working-directory: platform
        # Not --frozen-lockfile: this plugin isn't in the platform's own
        # lockfile, so the resolution here is necessarily fresh.
        run: pnpm install

      - name: Format check
        working-directory: platform
        run: pnpm exec prettier --check 'plugins/sovereign-docs.local/**/*.{ts,tsx,json,css,md}'

      - name: Lint
        working-directory: platform
        run: pnpm exec eslint 'plugins/sovereign-docs.local/**/*.{ts,tsx}'

      - name: Typecheck
        working-directory: platform/plugins/sovereign-docs.local
        run: pnpm typecheck

      - name: Test
        working-directory: platform/plugins/sovereign-docs.local
        run: pnpm test
